name: Auto Release on Addition Merge

on:
  pull_request:
    types: [closed]
    branches:
      - main

jobs:
  create-release:
    # Only run if the PR was merged and came from an Addition branch
    if: |
      github.event.pull_request.merged == true &&
      startsWith(github.event.pull_request.head.ref, 'Addition')

    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install build tools
        run: pip install build twine

      - name: Read version from setup.py (no auto-bump)
        id: version
        working-directory: Aiden3DRenderer
        run: |
          set -euo pipefail
          python - <<'PY'
          import os, re, subprocess
          from pathlib import Path

          setup_path = Path("setup.py")
          data = setup_path.read_text(encoding="utf-8")

          m = re.search(r'version\s*=\s*[\'"]([^\'"]+)[\'"]', data)
          if not m:
            raise SystemExit("ERROR: Could not find version=... in Aiden3DRenderer/setup.py")

          version = m.group(1).strip()
          parts = version.split(".")
          if len(parts) != 3 or not all(p.isdigit() for p in parts):
            raise SystemExit(f"ERROR: Version in setup.py must be numeric X.Y.Z (example: 1.2.3). Found: {version}")

          # Find previous tag for changelog link (optional)
          latest_tag = ""
          try:
            latest_tag = subprocess.check_output(
              ["git", "describe", "--tags", "--abbrev=0"],
              stderr=subprocess.DEVNULL,
              text=True
            ).strip()
          except Exception:
            latest_tag = ""

          new_tag = f"v{version}"

          out_path = Path(os.environ["GITHUB_OUTPUT"])
          with out_path.open("a", encoding="utf-8") as f:
            f.write(f"new_version={version}\n")
            f.write(f"new_tag={new_tag}\n")
            f.write(f"latest_tag={latest_tag}\n")

          print(f"Using version from setup.py: {version} (tag {new_tag})")
          PY

      # setup.py reads README.md with open("README.md") which resolves
      # relative to wherever the build runs. Copying it into Aiden3DRenderer/
      # before building satisfies that open() call without touching your repo structure.
      - name: Copy README into package folder for build
        run: cp README.md Aiden3DRenderer/README.md

      - name: Show computed version
        run: |
          echo "Computed new_version=${{ steps.version.outputs.new_version }}"
          python -c "from packaging.version import Version; Version('${{ steps.version.outputs.new_version }}'); print('PEP440 OK')"

      - name: Build package
        working-directory: Aiden3DRenderer
        run: python -m build

      - name: Check distribution
        working-directory: Aiden3DRenderer
        run: twine check dist/*

      - name: Publish to PyPI
        working-directory: Aiden3DRenderer
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: twine upload dist/*

      - name: Build release notes
        shell: bash
        env:
          BRANCH: ${{ github.event.pull_request.head.ref }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          MERGE_SHA: ${{ github.event.pull_request.merge_commit_sha }}
          VERSION: ${{ steps.version.outputs.new_version }}
          NEW_TAG: ${{ steps.version.outputs.new_tag }}
          LATEST_TAG: ${{ steps.version.outputs.latest_tag }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          python - <<'PY'
          import os
          import subprocess
          from pathlib import Path

          branch = os.environ.get("BRANCH", "")
          pr_title = os.environ.get("PR_TITLE", "")
          pr_body = os.environ.get("PR_BODY", "") or ""
          pr_number = os.environ.get("PR_NUMBER", "")
          pr_author = os.environ.get("PR_AUTHOR", "")
          merge_sha = os.environ.get("MERGE_SHA", "")
          version = os.environ.get("VERSION", "")
          new_tag = os.environ.get("NEW_TAG", "")
          latest_tag = os.environ.get("LATEST_TAG", "")
          repo = os.environ.get("REPO", "")

          # Build changelog URL exactly like before
          changelog_url = f"https://github.com/{repo}/releases/tag/{new_tag}"
          if latest_tag:
              try:
                  subprocess.check_call(
                      ["git", "ls-remote", "--tags", "origin", f"refs/tags/{latest_tag}"],
                      stdout=subprocess.DEVNULL,
                      stderr=subprocess.DEVNULL
                  )
                  changelog_url = f"https://github.com/{repo}/compare/{latest_tag}...{new_tag}"
              except Exception:
                  pass

          # Keep same output shape as before, including markdown code blocks.
          # This text is written as literal file content (never executed by shell).
          notes = f"""## What's Changed

          **Branch:** `{branch}`
          **PR:** [#{pr_number}](https://github.com/{repo}/pull/{pr_number}) — {pr_title}
          **Author:** @{pr_author}
          **Commit:** `{merge_sha[:7]}`

          ---

          ## Pull Request Details

          ### {pr_title}

          {pr_body}

          ---

          ## Install

          ```bash
          pip install aiden3drenderer=={version}
          ```

          ## Example (Python)

          ```python
          from aiden3drenderer import Renderer3D

          renderer = Renderer3D()
          # ...
          ```

          **Full Changelog:** {changelog_url}
          """

          # Remove leading indentation from the triple-quoted string block
          lines = notes.splitlines()
          # normalize indentation from first non-empty line onward
          def lstrip_common(lines_):
              non_empty = [ln for ln in lines_ if ln.strip()]
              if not non_empty:
                  return lines_
              import re
              indents = [len(re.match(r"^[ \t]*", ln).group(0)) for ln in non_empty]
              min_indent = min(indents)
              return [ln[min_indent:] if len(ln) >= min_indent else ln for ln in lines_]

          clean_notes = "\n".join(lstrip_common(lines)).strip() + "\n"
          Path("release_notes.md").write_text(clean_notes, encoding="utf-8")
          PY
      - name: Create and push tag (no pushes to main)
        run: |
          set -euo pipefail
          TAG="${{ steps.version.outputs.new_tag }}"

          # Fail clearly if tag already exists
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "ERROR: Tag $TAG already exists locally. Bump version in setup.py." >&2
            exit 1
          fi
          if git ls-remote --tags origin "refs/tags/$TAG" | grep -q .; then
            echo "ERROR: Tag $TAG already exists on origin. Bump version in setup.py." >&2
            exit 1
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git tag "$TAG"
          git push origin "refs/tags/$TAG"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.new_tag }}
          name: Release ${{ steps.version.outputs.new_tag }}
          body_path: release_notes.md
          files: Aiden3DRenderer/dist/*
          draft: false
          prerelease: false
          make_latest: true
