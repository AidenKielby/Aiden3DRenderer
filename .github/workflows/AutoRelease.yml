name: Auto Release on Addition Merge

on:
  pull_request:
    types: [closed]
    branches:
      - main

jobs:
  create-release:
    # Only run if the PR was merged and came from an Addition branch
    if: |
      github.event.pull_request.merged == true &&
      startsWith(github.event.pull_request.head.ref, 'Addition')

    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install build tools
        run: pip install build twine

      - name: Read version from setup.py (no auto-bump)
        id: version
        working-directory: Aiden3DRenderer
        run: |
          set -euo pipefail
          python - <<'PY'
          import os, re, subprocess
          from pathlib import Path

          setup_path = Path("setup.py")
          data = setup_path.read_text(encoding="utf-8")

          m = re.search(r'version\s*=\s*[\'"]([^\'"]+)[\'"]', data)
          if not m:
            raise SystemExit("ERROR: Could not find version=... in Aiden3DRenderer/setup.py")

          version = m.group(1).strip()
          parts = version.split(".")
          if len(parts) != 3 or not all(p.isdigit() for p in parts):
            raise SystemExit(f"ERROR: Version in setup.py must be numeric X.Y.Z (example: 1.2.3). Found: {version}")

          # Find previous tag for changelog link (optional)
          latest_tag = ""
          try:
            latest_tag = subprocess.check_output(
              ["git", "describe", "--tags", "--abbrev=0"],
              stderr=subprocess.DEVNULL,
              text=True
            ).strip()
          except Exception:
            latest_tag = ""

          new_tag = f"v{version}"

          out_path = Path(os.environ["GITHUB_OUTPUT"])
          with out_path.open("a", encoding="utf-8") as f:
            f.write(f"new_version={version}\n")
            f.write(f"new_tag={new_tag}\n")
            f.write(f"latest_tag={latest_tag}\n")

          print(f"Using version from setup.py: {version} (tag {new_tag})")
          PY

      # setup.py reads README.md with open("README.md") which resolves
      # relative to wherever the build runs. Copying it into Aiden3DRenderer/
      # before building satisfies that open() call without touching your repo structure.
      - name: Copy README into package folder for build
        run: cp README.md Aiden3DRenderer/README.md

      - name: Show computed version
        run: |
          echo "Computed new_version=${{ steps.version.outputs.new_version }}"
          python -c "from packaging.version import Version; Version('${{ steps.version.outputs.new_version }}'); print('PEP440 OK')"

      - name: Build package
        working-directory: Aiden3DRenderer
        run: python -m build

      - name: Check distribution
        working-directory: Aiden3DRenderer
        run: twine check dist/*

      - name: Publish to PyPI
        working-directory: Aiden3DRenderer
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: twine upload dist/*

      - name: Build release notes
        run: |
          BRANCH="${{ github.event.pull_request.head.ref }}"
          PR_TITLE="${{ github.event.pull_request.title }}"
          PR_BODY="${{ github.event.pull_request.body }}"
          PR_NUMBER="${{ github.event.pull_request.number }}"
          PR_AUTHOR="${{ github.event.pull_request.user.login }}"
          MERGE_SHA="${{ github.event.pull_request.merge_commit_sha }}"
          VERSION="${{ steps.version.outputs.new_version }}"
          NEW="${{ steps.version.outputs.new_tag }}"
          LATEST="${{ steps.version.outputs.latest_tag }}"
      
          # Only use compare URL if a previous tag actually exists on the remote
          if git ls-remote --tags origin "refs/tags/${LATEST}" | grep -q . && [ -n "$LATEST" ]; then
            CHANGELOG_URL="https://github.com/${{ github.repository }}/compare/${LATEST}...${NEW}"
          else
            CHANGELOG_URL="https://github.com/${{ github.repository }}/releases/tag/${NEW}"
          fi
      
          cat > release_notes.md << EOF
          ## What's Changed
      
          **Branch:** \`${BRANCH}\`
          **PR:** [#${PR_NUMBER}](https://github.com/${{ github.repository }}/pull/${PR_NUMBER}) — ${PR_TITLE}
          **Author:** @${PR_AUTHOR}
          **Commit:** \`${MERGE_SHA:0:7}\`
      
          ---
      
          ## Pull Request Details
      
          ### ${PR_TITLE}
      
          ${PR_BODY}
      
          ---
      
          ## Install
      
          \`\`\`
          pip install aiden3drenderer==${VERSION}
          \`\`\`
      
          **Full Changelog:** ${CHANGELOG_URL}
          EOF
      - name: Create and push tag (no pushes to main)
        run: |
          set -euo pipefail
          TAG="${{ steps.version.outputs.new_tag }}"

          # Fail clearly if tag already exists
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "ERROR: Tag $TAG already exists locally. Bump version in setup.py." >&2
            exit 1
          fi
          if git ls-remote --tags origin "refs/tags/$TAG" | grep -q .; then
            echo "ERROR: Tag $TAG already exists on origin. Bump version in setup.py." >&2
            exit 1
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git tag "$TAG"
          git push origin "refs/tags/$TAG"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.new_tag }}
          name: Release ${{ steps.version.outputs.new_tag }}
          body_path: release_notes.md
          files: Aiden3DRenderer/dist/*
          draft: false
          prerelease: false
          make_latest: true
