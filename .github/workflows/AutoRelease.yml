name: Auto Release on Addition Merge

on:
  pull_request:
    types: [closed]
    branches:
      - main

jobs:
  create-release:
    # Only run if the PR was merged and came from an Addition branch
    if: |
      github.event.pull_request.merged == true &&
      startsWith(github.event.pull_request.head.ref, 'Addition')

    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install build tools
        run: pip install build twine

      - name: Generate version from setup.py (increment patch)
        id: version
        working-directory: Aiden3DRenderer
        run: |
          set -euo pipefail
          python - <<'PY'
          import os, re
          from pathlib import Path
      
          setup_path = Path("setup.py")
          data = setup_path.read_text(encoding="utf-8")
      
          m = re.search(r'version\s*=\s*[\'"]([^\'"]+)[\'"]', data)
          if not m:
            raise SystemExit("ERROR: Could not find version=... in setup.py")
      
          old_version = m.group(1).strip()
          parts = old_version.split(".")
          if len(parts) != 3 or not all(p.isdigit() for p in parts):
            raise SystemExit(f"ERROR: Version in setup.py is not X.Y.Z numeric: {old_version}")
      
          major, minor, patch = map(int, parts)
          new_version = f"{major}.{minor}.{patch + 1}"
      
          new_data = re.sub(
            r'(version\s*=\s*)[\'"][^\'"]+[\'"]',
            r'\1"' + new_version + r'"',
            data,
            count=1
          )
          setup_path.write_text(new_data, encoding="utf-8")
      
          out_path = Path(os.environ["GITHUB_OUTPUT"])
          with out_path.open("a", encoding="utf-8") as f:
            f.write(f"old_version={old_version}\n")
            f.write(f"new_version={new_version}\n")
            f.write(f"new_tag=v{new_version}\n")
            f.write(f"latest_tag=v{old_version}\n")
      
          print(f"Bumped setup.py: {old_version} -> {new_version}")
          PY

      # setup.py reads README.md with open("README.md") which resolves
      # relative to wherever the build runs. Copying it into Aiden3DRenderer/
      # before building satisfies that open() call without touching your repo structure.
      - name: Copy README into package folder for build
        run: cp README.md Aiden3DRenderer/README.md

      - name: Install build tools
        run: pip install build twine packaging

      - name: Show computed version
        run: |
          echo "Computed new_version=${{ steps.version.outputs.new_version }}"
          python -c "from packaging.version import Version; Version('${{ steps.version.outputs.new_version }}'); print('PEP440 OK')"

      - name: Build package
        working-directory: Aiden3DRenderer
        run: python -m build

      - name: Check distribution
        working-directory: Aiden3DRenderer
        run: twine check dist/*

      - name: Publish to PyPI
        working-directory: Aiden3DRenderer
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: twine upload dist/*

      - name: Build release notes
        run: |
          BRANCH="${{ github.event.pull_request.head.ref }}"
          PR_TITLE="${{ github.event.pull_request.title }}"
          PR_NUMBER="${{ github.event.pull_request.number }}"
          PR_AUTHOR="${{ github.event.pull_request.user.login }}"
          MERGE_SHA="${{ github.event.pull_request.merge_commit_sha }}"
          VERSION="${{ steps.version.outputs.new_version }}"

          cat > release_notes.md << EOF
          ## What's Changed

          **Branch:** \`${BRANCH}\`
          **PR:** [#${PR_NUMBER}](https://github.com/${{ github.repository }}/pull/${PR_NUMBER}) — ${PR_TITLE}
          **Author:** @${PR_AUTHOR}
          **Commit:** \`${MERGE_SHA:0:7}\`

          ## Install

          \`\`\`
          pip install aiden3drenderer==${VERSION}
          \`\`\`

          **Full Changelog:** https://github.com/${{ github.repository }}/compare/${{ steps.version.outputs.latest_tag }}...${{ steps.version.outputs.new_tag }}
          EOF
      - name: Commit version bump and tag
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
      
          git add Aiden3DRenderer/setup.py
          git commit -m "Bump version to ${{ steps.version.outputs.new_version }}" || echo "No changes to commit"
      
          git tag "${{ steps.version.outputs.new_tag }}"
          git push origin HEAD:main --tags

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.new_tag }}
          name: Release ${{ steps.version.outputs.new_tag }}
          body_path: release_notes.md
          files: Aiden3DRenderer/dist/*
          draft: false
          prerelease: false
          make_latest: true
